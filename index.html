
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reproductor Joshua LP</title>
<style>
body{margin:0;padding-bottom:90px;font-family:Arial,sans-serif}
#playerbar{position:fixed;left:0;right:0;bottom:0;height:90px;background:#181818;color:#fff;display:flex;align-items:center;gap:12px;padding:10px;box-sizing:border-box}
button{font-size:20px}
#title{flex:1}
#seek{flex:2}
</style>
</head>
<body>
<div id="playerbar">
<button id="prev">⏮</button>
<button id="play">▶️</button>
<button id="next">⏭</button>
<div id="title">Sin reproducción</div>
<input id="seek" type="range" min="0" max="100" value="0">
<input id="vol" type="range" min="0" max="1" step="0.01" value="1">
</div>
<audio id="audio"></audio>
<script>
const tracks=[
 {title:"José Madero - Zero (Feat. Zaira Jabnell)",url:"https://raw.githubusercontent.com/joshualpweb/music/main/Jos%C3%A9%20Madero%20-%20Zero%20(Feat.%20Zaira%20Jabnell).mp3"},
 {title:"La Petite Mort CD 1 TRACK 1",url:"https://raw.githubusercontent.com/joshualpweb/music/main/La%20Petite%20Mort%20CD%201%20TRACK%201%20%28320%29.mp3"}
];
let idx=0;
const audio=document.getElementById('audio');
const playBtn=document.getElementById('play');
const title=document.getElementById('title');
const seek=document.getElementById('seek');
const vol=document.getElementById('vol');

function load(i){
 idx=i;
 audio.src=tracks[idx].url;
 title.textContent=tracks[idx].title;
}
load(0);

playBtn.onclick=()=>{
 if(audio.paused){audio.play();playBtn.textContent="⏸️";}
 else{audio.pause();playBtn.textContent="▶️";}
};
document.getElementById('next').onclick=()=>{load((idx+1)%tracks.length);audio.play();playBtn.textContent="⏸️";};
document.getElementById('prev').onclick=()=>{load((idx-1+tracks.length)%tracks.length);audio.play();playBtn.textContent="⏸️";};
audio.addEventListener('timeupdate',()=>{
 if(audio.duration){seek.value=audio.currentTime/audio.duration*100;}
});
seek.oninput=()=>{
 if(audio.duration){audio.currentTime=seek.value/100*audio.duration;}
};
vol.oninput=()=>audio.volume=vol.value;
audio.onended=()=>document.getElementById('next').click();
</script>
</body>
</html>
